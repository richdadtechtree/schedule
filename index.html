                if (!path) {
                    path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.id = `path-${node.id}`;
                    path.setAttribute('stroke', cat.color + '99');
                    path.setAttribute('stroke-width', '2.5');
                    path.setAttribute('fill', 'none');
                    path.setAttribute('stroke-linecap', 'round');
                    svg.appendChild(path);
                }
                path.setAttribute('d', d);
            });

            // Remove paths for nodes that no longer exist
            const nodeIds = new Set(map.nodes.map(n => n.id));
            svg.querySelectorAll('path').forEach(p => {
                const id = p.id.replace('path-', '');
                if (!nodeIds.has(id)) p.remove();
            });
        }

        function selectMMNode(id) {
            selectedMMNodeId = id;
            document.querySelectorAll('.mm-node').forEach(el => el.classList.remove('selected'));
            document.getElementById('mm-node-' + id)?.classList.add('selected');
        }

        function deselectMM(e) {
            if (e.target.id === 'mm-canvas' || e.target.id === 'mm-svg' || e.target.classList.contains('mm-canvas-wrap')) {
                selectedMMNodeId = null;
                document.querySelectorAll('.mm-node').forEach(el => el.classList.remove('selected'));
            }
        }

        function startMMEdit(id) {
            const map = mindMapData.maps[selectedMMCatId];
            const node = map.nodes.find(n => n.id === id);
            if (!node) return;
            const textEl = document.querySelector('#mm-node-' + id + ' .mm-node-text');
            if (!textEl) return;
            const input = document.createElement('input');
            input.className = 'mm-node-text-input';
            input.value = node.text;

            let done = false;
            const finish = (action) => {
                if (done) return;
                done = true;
                node.text = input.value.trim() || node.text;
                saveMMData();
                renderMMNodes();
                if (action === 'sibling' && node.parentId) {
                    selectMMNode(id);
                    addMMChild(node.parentId);
                } else if (action === 'child') {
                    selectMMNode(id);
                    addMMChild(id);
                } else {
                    selectMMNode(id);
                }
            };

            input.onblur = () => finish('done');
            input.onkeydown = e => {
                if (e.key === 'Enter') { e.preventDefault(); finish('sibling'); }
                if (e.key === 'Tab') { e.preventDefault(); finish('child'); }
                if (e.key === 'Escape') { done = true; renderMMNodes(); }
            };
            textEl.replaceWith(input); input.focus(); input.select();
        }

        function addMMChild(parentId) {
            const map = mindMapData.maps[selectedMMCatId];
            const parent = map.nodes.find(n => n.id === parentId);
            if (!parent) return;
            const siblings = map.nodes.filter(n => n.parentId === parentId);
            const idx = siblings.length;
            const ci = map.nodes.length % MM_NODE_BG.length;
            // Fan out: alternates above/below parent
            const dy = idx === 0 ? 0 : (idx % 2 === 1 ? Math.ceil(idx / 2) * 90 : -Math.ceil(idx / 2) * 90);
            const id = 'node_' + Date.now();
            map.nodes.push({ id, text: '새 항목', x: parent.x + 230, y: parent.y + dy, parentId, bg: MM_NODE_BG[ci], bd: MM_NODE_BD[ci] });
            saveMMData(); renderMMNodes(); selectMMNode(id);
            setTimeout(() => startMMEdit(id), 30);
        }

        function deleteMMNode(id) {
            const map = mindMapData.maps[selectedMMCatId];
            const toDelete = new Set();
            const collect = nid => { toDelete.add(nid); map.nodes.filter(n => n.parentId === nid).forEach(n => collect(n.id)); };
            collect(id);
            if (toDelete.size > 1 && !confirm(`이 항목과 하위 항목 ${toDelete.size - 1}개를 삭제할까요?`)) return;
            map.nodes = map.nodes.filter(n => !toDelete.has(n.id));
            selectedMMNodeId = null;
            saveMMData(); renderMMNodes(); renderMMCatList();
        }

        function startMMDrag(e, nodeId) {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            e.stopPropagation(); e.preventDefault();
            mmDraggingId = nodeId;
            const node = mindMapData.maps[selectedMMCatId].nodes.find(n => n.id === nodeId);
            mmDragStart = { x: e.clientX, y: e.clientY };
            mmNodeStart = { x: node.x, y: node.y };
            selectMMNode(nodeId);
        }

        let mmTicking = false;
        document.addEventListener('mousemove', e => {
            if (!mmDraggingId || mmTicking) return;
            mmTicking = true;
            requestAnimationFrame(() => {
                const map = mindMapData.maps[selectedMMCatId];
                if (!map) { mmTicking = false; return; }
                const node = map.nodes.find(n => n.id === mmDraggingId);
                if (!node) { mmTicking = false; return; }
                node.x = mmNodeStart.x + (e.clientX - mmDragStart.x);
                node.y = mmNodeStart.y + (e.clientY - mmDragStart.y);
                const el = document.getElementById('mm-node-' + mmDraggingId);
                if (el) { el.style.left = node.x + 'px'; el.style.top = node.y + 'px'; }
                updateMMLines();
                mmTicking = false;
            });
        });

        document.addEventListener('mouseup', () => { if (mmDraggingId) { saveMMData(); mmDraggingId = null; } });

        function resetMMView() {
            const root = mindMapData.maps[selectedMMCatId]?.nodes.find(n => n.isRoot);
            const wrap = document.getElementById('mm-canvas-wrap');
            if (root && wrap) { wrap.scrollLeft = root.x - wrap.clientWidth / 2 + 60; wrap.scrollTop = root.y - wrap.clientHeight / 2 + 20; }
        }

        let mmHistory = [];
        let mmHistoryIdx = -1;
        function pushMMHistory() {
            if (!selectedMMCatId) return;
            const state = JSON.stringify(mindMapData.maps[selectedMMCatId]);
            if (mmHistoryIdx >= 0 && mmHistory[mmHistoryIdx] === state) return;
            mmHistory = mmHistory.slice(0, mmHistoryIdx + 1);
            mmHistory.push(state);
            if (mmHistory.length > 50) mmHistory.shift();
            else mmHistoryIdx++;
        }
        function undoMM() {
            if (mmHistoryIdx <= 0) return;
            mmHistoryIdx--;
            mindMapData.maps[selectedMMCatId] = JSON.parse(mmHistory[mmHistoryIdx]);
            saveMMData(); renderMMNodes();
        }
        function redoMM() {
            if (mmHistoryIdx >= mmHistory.length - 1) return;
            mmHistoryIdx++;
            mindMapData.maps[selectedMMCatId] = JSON.parse(mmHistory[mmHistoryIdx]);
            saveMMData(); renderMMNodes();
        }

        async function exportMMImage() {
            const svg = document.getElementById('mm-svg');
            const canvas = document.getElementById('mm-export-canvas');
            const ctx = canvas.getContext('2d');
            const map = mindMapData.maps[selectedMMCatId];
            if (!map || !svg) return;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            map.nodes.forEach(n => {
                const el = document.getElementById('mm-node-' + n.id);
                const w = el ? el.offsetWidth : 100, h = el ? el.offsetHeight : 50;
                minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
                maxX = Math.max(maxX, n.x + w); maxY = Math.max(maxY, n.y + h);
            });
            const padding = 50;
            const width = maxX - minX + padding * 2, height = maxY - minY + padding * 2;
            canvas.width = width; canvas.height = height;

            ctx.fillStyle = document.documentElement.getAttribute('data-theme') === 'dark' ? '#0f172a' : '#ffffff';
            ctx.fillRect(0, 0, width, height);

            const svgData = new XMLSerializer().serializeToString(svg);
            const img = new Image();
            const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);

            img.onload = () => {
                ctx.drawImage(img, -minX + padding, -minY + padding);
                map.nodes.forEach(n => {
                    const el = document.getElementById('mm-node-' + n.id);
                    ctx.fillStyle = el.style.backgroundColor || el.style.background;
                    ctx.strokeStyle = el.style.borderColor;
                    ctx.lineWidth = 2;
                    const x = n.x - minX + padding, y = n.y - minY + padding;
                    const w = el.offsetWidth, h = el.offsetHeight;
                    ctx.beginPath(); ctx.roundRect(x, y, w, h, 20); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = el.style.color;
                    ctx.font = '800 13px Plus Jakarta Sans';
                    ctx.textAlign = 'center';
                    ctx.fillText(n.text, x + w / 2, y + h / 2 + 5);
                });
                const pngUrl = canvas.toDataURL('image/png');
                const downloadLink = document.createElement('a');
                downloadLink.download = `mindmap_${Date.now()}.png`;
                downloadLink.href = pngUrl;
                downloadLink.click();
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }

        document.addEventListener('keydown', e => {
            if (document.getElementById('mm-overlay').style.display === 'flex') {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 'z') { e.preventDefault(); undoMM(); }
                    if (e.key === 'y') { e.preventDefault(); redoMM(); }
                }
            }
        });

        const originalSelectMMCat = selectMMCat;
        selectMMCat = function (id) {
            originalSelectMMCat(id);
            mmHistory = []; mmHistoryIdx = -1;
            pushMMHistory();
        };

        const originalSaveMMData = saveMMData;
        saveMMData = function () {
            originalSaveMMData();
            pushMMHistory();
        };

        saveMMData();

        memoInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addMemo(); });
        selectDate(new Date());
    </script>
