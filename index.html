<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Matrix Planner - Smart Alarm Edition</title>
    <meta name="description" content="일정 시간과 알람 시간을 각각 설정할 수 있는 감성적인 매트릭스 플래너입니다.">
    <!-- Google Fonts: Plus Jakarta Sans & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-light: #c4b5fd;
            --accent: #f472b6;
            --bg-main: #fdf2f8;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #1e1b4b;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --low: #94a3b8;
            --holiday: #f43f5e;
            --radius-lg: 32px;
            --radius-md: 20px;
            --shadow-soft: 0 24px 48px -12px rgba(139, 92, 246, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-main: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-dark: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #a78bfa;
            --primary-light: #4c1d95;
            --shadow-soft: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fdf2f8 0%, #eef2ff 50%, #f0fdf4 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: var(--text-dark);
            transition: var(--transition);
        }

        [data-theme="dark"] body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.4;
            animation: float 25s infinite alternate;
        }

        body::before {
            background: var(--primary-light);
            top: -150px;
            left: -150px;
        }

        body::after {
            background: #fbcfe8;
            bottom: -150px;
            right: -150px;
            animation-delay: -12s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(60px, 60px) scale(1.15);
            }
        }

        .container {
            width: 100%;
            max-width: 1120px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-soft);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 32px;
            transform: translateZ(0);
            will-change: transform;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.04em;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 40px;
            align-items: start;
        }

        .left-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .calendar-card {
            background: white;
            border-radius: var(--radius-md);
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
        }

        .side-card {
            background: white;
            border-radius: var(--radius-md);
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .side-card-title {
            font-size: 0.875rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .quick-memo-textarea {
            resize: none;
            height: 110px;
            padding: 12px 14px;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            font-size: 0.85rem;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            line-height: 1.6;
            color: var(--text-dark);
            transition: border-color 0.2s;
        }

        .quick-memo-textarea:focus {
            border-color: var(--primary-light);
        }

        .memo-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .char-count {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .side-btns {
            display: flex;
            gap: 6px;
        }

        .side-btn {
            padding: 6px 14px;
            border-radius: 10px;
            border: none;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .side-btn.primary {
            background: var(--primary);
            color: white;
        }

        .side-btn.primary:hover {
            opacity: 0.85;
        }

        .side-btn.ghost {
            background: #f1f5f9;
            color: var(--text-muted);
        }

        .side-btn.ghost:hover {
            background: #e2e8f0;
        }

        .search-field {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            font-size: 0.85rem;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            color: var(--text-dark);
            transition: border-color 0.2s;
        }

        .search-field:focus {
            border-color: var(--primary-light);
        }

        .search-results {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 220px;
            overflow-y: auto;
        }

        .search-result-item {
            padding: 10px 12px;
            border-radius: 10px;
            background: var(--bg-main);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 3px;
            transition: background 0.2s;
        }

        .search-result-item:hover {
            background: #ede9fe;
        }

        .result-date {
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .result-text {
            font-size: 0.83rem;
            font-weight: 600;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-priority {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--primary);
        }

        .search-empty {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            padding: 20px 0;
            font-weight: 500;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .calendar-nav {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            background: var(--bg-main);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            transition: all 0.2s ease;
        }

        .editable-date {
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-dark);
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .editable-date:hover {
            background: var(--bg-main);
            color: var(--primary);
        }

        .year-input {
            width: 72px;
            font-size: 1rem;
            font-weight: 700;
            padding: 3px 8px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            outline: none;
            color: var(--text-dark);
        }

        .month-select {
            font-size: 1rem;
            font-weight: 700;
            padding: 3px 6px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            outline: none;
            color: var(--text-dark);
            background: white;
            cursor: pointer;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }

        .day-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            padding-bottom: 10px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .calendar-day.selected {
            background: var(--primary);
            color: white !important;
        }

        .calendar-day.sun,
        .calendar-day.holiday {
            color: var(--holiday);
        }

        .calendar-day.has-memo::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
        }

        /* Memo Section */
        .memo-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .memo-header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .selected-date-text {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .view-toggle {
            display: flex;
            background: rgba(0, 0, 0, 0.04);
            padding: 4px;
            border-radius: 12px;
            gap: 4px;
        }

        .toggle-btn {
            padding: 6px 16px;
            border-radius: 10px;
            border: none;
            background: transparent;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
        }

        .toggle-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        /* Enhanced Input Container */
        .input-container {
            background: white;
            padding: 24px;
            border-radius: var(--radius-md);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            gap: 16px;
            border: 1px solid #f1f5f9;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            border-radius: 14px;
            border: 2px solid #f1f5f9;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
        }

        .time-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .time-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .time-field label {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--text-muted);
            padding-left: 4px;
        }

        input[type="time"] {
            padding: 8px 12px;
            border-radius: 12px;
            border: 2px solid #f1f5f9;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dark);
            outline: none;
        }

        .priority-select {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .priority-btn {
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid #f1f5f9;
            background: white;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--text-muted);
        }

        .priority-btn.active[data-priority="urgent-important"] {
            background: var(--danger);
            color: white;
        }

        .priority-btn.active[data-priority="important"] {
            background: var(--primary);
            color: white;
        }

        .priority-btn.active[data-priority="urgent"] {
            background: var(--warning);
            color: white;
        }

        .priority-btn.active[data-priority="low"] {
            background: var(--low);
            color: white;
        }

        #add-btn {
            background: var(--text-dark);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Memo Items */
        .memo-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .memo-item {
            background: white;
            padding: 16px 20px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #f1f5f9;
            border-left: 8px solid transparent;
            animation: fadeIn 0.4s ease-out backwards;
        }

        .memo-item.priority-urgent-important {
            border-left-color: var(--danger);
        }

        .memo-item.priority-important {
            border-left-color: var(--primary);
        }

        .memo-item.priority-urgent {
            border-left-color: var(--warning);
        }

        .memo-item.priority-low {
            border-left-color: var(--low);
        }

        .time-info {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .time-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .time-badge.event {
            color: var(--primary);
            background: var(--bg-main);
        }

        .time-badge.alarm {
            color: var(--accent);
            background: #fff1f2;
        }

        .memo-text {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .memo-item.completed {
            opacity: 0.5;
            background: #f8fafc;
        }

        .memo-item.completed .memo-text {
            text-decoration: line-through;
        }

        .actions {
            display: flex;
            gap: 6px;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Alarm Modal */
        .alarm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .alarm-modal {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 40px;
            border-radius: 32px;
            text-align: center;
            box-shadow: var(--shadow-soft);
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .alarm-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: ring 0.5s infinite alternate;
        }

        @keyframes ring {
            from {
                transform: rotate(-10deg);
            }

            to {
                transform: rotate(10deg);
            }
        }

        .alarm-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .alarm-text {
            color: var(--text-muted);
            margin-bottom: 24px;
            font-weight: 500;
        }

        .alarm-close {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        /* ── 메모하기 트리거 카드 ── */
        .side-card-trigger {
            cursor: pointer;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }

        .side-card-trigger:hover {
            border-color: var(--primary-light);
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.1);
        }

        .trigger-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .trigger-icon {
            font-size: 1.5rem;
            line-height: 1;
        }

        .trigger-sub {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 2px;
        }

        /* ── 카테고리 메모 모달 ── */
        .cat-memo-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            z-index: 1001;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .cat-memo-modal {
            background: white;
            width: 100%;
            max-width: 820px;
            height: 78vh;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 32px 64px -12px rgba(0, 0, 0, 0.2);
            animation: popUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateZ(0);
        }

        .cat-modal-header {
            padding: 18px 24px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .cat-modal-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .cat-modal-close {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-muted);
            transition: background 0.2s;
        }

        .cat-modal-close:hover {
            background: #e2e8f0;
        }

        .cat-modal-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 카테고리 패널 */
        .cat-panel {
            width: 200px;
            border-right: 1px solid #f1f5f9;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .cat-panel-top {
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            flex-shrink: 0;
        }

        .cat-add-btn {
            width: 100%;
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px dashed #d1d5db;
            background: transparent;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .cat-add-btn:hover {
            border-color: var(--primary-light);
            color: var(--primary);
            background: var(--bg-main);
        }

        .cat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .cat-item {
            padding: 9px 10px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-dark);
            transition: all 0.2s;
        }

        .cat-item:hover {
            background: #f8fafc;
        }

        .cat-item.active {
            background: var(--bg-main);
            color: var(--primary);
        }

        .cat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .cat-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .cat-count {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-muted);
            background: #f1f5f9;
            padding: 1px 6px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .cat-item.active .cat-count {
            background: white;
            color: var(--primary);
        }

        .cat-del-btn {
            display: none;
            width: 18px;
            height: 18px;
            border-radius: 5px;
            border: none;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.7rem;
            flex-shrink: 0;
            transition: color 0.2s;
        }

        .cat-item:hover .cat-del-btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cat-del-btn:hover {
            color: var(--danger);
        }

        /* 카테고리 추가 폼 */
        .cat-add-form {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .cat-name-input {
            width: 100%;
            padding: 7px 10px;
            border: 2px solid var(--primary-light);
            border-radius: 10px;
            font-size: 0.82rem;
            font-family: inherit;
            font-weight: 600;
            outline: none;
            color: var(--text-dark);
            flex: unset;
        }

        .color-palette {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.15s;
            border: 2px solid transparent;
            flex-shrink: 0;
        }

        .color-dot.selected {
            transform: scale(1.25);
            border-color: var(--text-dark);
        }

        .cat-form-btns {
            display: flex;
            gap: 6px;
        }

        /* 노트 패널 */
        .note-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .no-cat-msg {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .note-panel-top {
            padding: 14px 18px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .note-panel-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .note-add-btn {
            padding: 6px 14px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: inherit;
        }

        .note-add-btn:hover {
            opacity: 0.85;
        }

        .note-list {
            flex: 1;
            overflow-y: auto;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .note-item {
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #f1f5f9;
            transition: all 0.2s;
            background: white;
        }

        .note-item:hover {
            border-color: var(--primary-light);
            box-shadow: 0 2px 12px rgba(139, 92, 246, 0.08);
        }

        .note-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 5px;
        }

        .note-item-title {
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .note-item-btns {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .note-icon-btn {
            width: 26px;
            height: 26px;
            border-radius: 8px;
            border: none;
            background: #f8fafc;
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .note-icon-btn:hover {
            background: #e2e8f0;
        }

        .note-item-preview {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-weight: 500;
            line-height: 1.5;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            white-space: pre-wrap;
        }

        .note-item-date {
            font-size: 0.67rem;
            color: #cbd5e1;
            font-weight: 600;
            margin-top: 8px;
        }

        .note-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-muted);
            padding: 40px;
        }

        .note-empty-icon {
            font-size: 2.5rem;
            opacity: 0.35;
        }

        .note-empty-text {
            font-size: 0.85rem;
            font-weight: 700;
        }

        /* 노트 에디터 */
        .note-editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 12px;
            overflow: hidden;
        }

        .note-editor-title-input {
            padding: 10px 14px;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: inherit;
            outline: none;
            color: var(--text-dark);
            transition: border-color 0.2s;
            flex: unset;
        }

        .note-editor-title-input:focus {
            border-color: var(--primary-light);
        }

        .note-editor-body {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            font-size: 0.85rem;
            font-family: inherit;
            font-weight: 500;
            line-height: 1.7;
            outline: none;
            resize: none;
            color: var(--text-dark);
            transition: border-color 0.2s;
        }

        .note-editor-body:focus {
            border-color: var(--primary-light);
        }

        .note-editor-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            flex-shrink: 0;
        }

        /* ── 마인드맵 ── */
        .mm-toolbar {
            padding: 10px 16px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            background: white;
        }

        .mm-hint {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .mm-tool-btn {
            padding: 5px 12px;
            border-radius: 8px;
            border: 1px solid #f1f5f9;
            background: white;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--text-muted);
            font-family: inherit;
            transition: all 0.2s;
        }

        .mm-tool-btn:hover {
            border-color: var(--primary-light);
            color: var(--primary);
        }

        .mm-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .mm-no-cat {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .mm-canvas-wrap {
            flex: 1;
            overflow: auto;
            background: #fafafa;
            background-image: radial-gradient(circle, #e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .mm-canvas {
            position: relative;
            width: 3000px;
            height: 2000px;
        }

        .mm-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 3000px;
            height: 2000px;
            pointer-events: none;
        }

        .mm-node {
            position: absolute;
            border: 2px solid #c4b5fd;
            border-radius: 20px;
            padding: 8px 16px;
            cursor: grab;
            user-select: none;
            min-width: 80px;
            max-width: 200px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transform: translateZ(0);
            will-change: left, top;
        }

        .mm-node:active {
            cursor: grabbing;
        }

        .mm-node.root {
            border-radius: 24px;
            border-width: 3px;
            padding: 12px 22px;
        }

        .mm-node.selected {
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2), 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .mm-node-text {
            font-size: 0.82rem;
            font-weight: 600;
            display: block;
            white-space: nowrap;
            pointer-events: none;
        }

        .mm-node.root .mm-node-text {
            font-size: 0.92rem;
            font-weight: 800;
        }

        .mm-node-text-input {
            border: none;
            outline: none;
            background: transparent;
            font-size: 0.82rem;
            font-weight: 600;
            color: inherit;
            text-align: center;
            width: 100%;
            min-width: 60px;
            max-width: 160px;
            font-family: inherit;
        }

        .mm-node.root .mm-node-text-input {
            font-size: 0.92rem;
            font-weight: 800;
        }

        .mm-node-controls {
            display: none;
            gap: 4px;
        }

        .mm-node.selected .mm-node-controls {
            display: flex;
        }

        .mm-ctrl-btn {
            width: 22px;
            height: 22px;
            border-radius: 7px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.15s;
            line-height: 1;
        }

        .mm-ctrl-btn:hover {
            opacity: 0.75;
        }

        .mm-ctrl-add {
            background: var(--primary);
            color: white;
        }

        .mm-ctrl-del {
            background: var(--danger);
            color: white;
        }

        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 30px 20px;
            }

            .cat-memo-modal {
                height: 90vh;
            }

            .cat-panel {
                width: 160px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>✨ Matrix Planner</h1>
            <div style="display:flex; gap:12px; align-items:center;">
                <button class="toggle-btn" id="theme-toggle" onclick="toggleTheme()"
                    style="padding:8px; border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:1.2rem;">🌓</button>
                <div class="view-toggle">
                    <button class="toggle-btn active" id="view-daily" onclick="setViewMode('daily')">Daily</button>
                    <button class="toggle-btn" id="view-weekly" onclick="setViewMode('weekly')">Weekly</button>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <div class="left-column">
                <section class="calendar-card">
                    <div class="calendar-header">
                        <div id="month-year-display" style="display:flex;align-items:center;gap:2px;"></div>
                        <div class="calendar-nav">
                            <button class="nav-btn" onclick="changeMonth(-1)"><svg width="16" height="16"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="15 18 9 12 15 6"></polyline>
                                </svg></button>
                            <button class="nav-btn" onclick="changeMonth(1)"><svg width="16" height="16"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg></button>
                        </div>
                    </div>
                    <div class="calendar-grid" id="calendar-grid"></div>
                </section>

                <div class="side-card side-card-trigger" onclick="openMemoModal()">
                    <div class="trigger-info">
                        <span class="trigger-icon">📝</span>
                        <div>
                            <div class="side-card-title">메모하기</div>
                            <div class="trigger-sub" id="memo-trigger-sub">카테고리별 메모 관리</div>
                        </div>
                    </div>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </div>

                <div class="side-card side-card-trigger" onclick="openMindMapModal()">
                    <div class="trigger-info">
                        <span class="trigger-icon">🧠</span>
                        <div>
                            <div class="side-card-title">마인드맵</div>
                            <div class="trigger-sub" id="mm-trigger-sub">카테고리별 마인드맵 관리</div>
                        </div>
                    </div>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </div>

                <div class="side-card">
                    <div class="side-card-title">🔍 일정찾기</div>
                    <input type="text" class="search-field" id="search-field" placeholder="할 일을 검색하세요...">
                    <div class="search-results" id="search-results"></div>
                </div>
            </div>



            <section class="memo-section">
                <div class="memo-header-info">
                    <h2 class="selected-date-text" id="selected-date-display">2026년 4월 22일</h2>
                    <div id="memo-stats" style="font-weight: 700; color: var(--text-muted); font-size: 0.85rem;">0 items
                    </div>
                </div>

                <div class="input-container">
                    <div class="input-row">
                        <input type="text" id="memo-input" placeholder="새로운 할 일을 입력하세요..." autocomplete="off">
                        <button id="add-btn" onclick="addMemo()">추가</button>
                    </div>
                    <div class="time-group">
                        <div class="time-field">
                            <label>일정 시간</label>
                            <input type="time" id="memo-event-time">
                        </div>
                        <div class="time-field">
                            <label>알람/팝업 시간</label>
                            <input type="time" id="memo-alarm-time">
                        </div>
                    </div>
                    <div class="priority-select" id="priority-select">
                        <button class="priority-btn active" data-priority="urgent-important">급하고 중요한 일</button>
                        <button class="priority-btn" data-priority="important">중요한 일</button>
                        <button class="priority-btn" data-priority="urgent">급한데 덜 중요한 일</button>
                        <button class="priority-btn" data-priority="low">덜 중요한 일</button>
                    </div>
                </div>

                <div id="memo-list-container" class="memo-list"></div>
                <div id="empty-state" class="empty-state">등록된 할 일이 없습니다.</div>
            </section>
        </div>
    </div>

    <!-- Category Memo Modal -->
    <div class="cat-memo-overlay" id="cat-memo-overlay" onclick="if(event.target===this)closeMemoModal()">
        <div class="cat-memo-modal">
            <div class="cat-modal-header">
                <span class="cat-modal-title">📝 메모하기</span>
                <button class="cat-modal-close" onclick="closeMemoModal()">✕</button>
            </div>
            <div class="cat-modal-body">
                <div class="cat-panel">
                    <div class="cat-panel-top" id="cat-panel-top">
                        <button class="cat-add-btn" onclick="showCatForm()">+ 새 카테고리</button>
                    </div>
                    <div class="cat-list" id="cat-list"></div>
                </div>
                <div class="note-panel" id="note-panel">
                    <div class="no-cat-msg">카테고리를 선택하세요</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mind Map Modal -->
    <div class="cat-memo-overlay" id="mm-overlay" onclick="if(event.target===this)closeMindMapModal()">
        <div class="cat-memo-modal">
            <div class="cat-modal-header">
                <span class="cat-modal-title">🧠 마인드맵</span>
                <button class="cat-modal-close" onclick="closeMindMapModal()">✕</button>
            </div>
            <div class="cat-modal-body">
                <div class="cat-panel">
                    <div class="cat-panel-top" id="mm-panel-top">
                        <button class="cat-add-btn" onclick="showMMCatForm()">+ 새 마인드맵</button>
                    </div>
                    <div class="cat-list" id="mm-cat-list"></div>
                </div>
                <div class="mm-content" id="mm-content">
                    <div class="mm-no-cat">마인드맵을 선택하세요</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Alarm Modal -->
    <div class="alarm-overlay" id="alarm-overlay">
        <div class="alarm-modal">
            <div class="alarm-icon">🔔</div>
            <div class="alarm-title">지금 알람!</div>
            <div class="alarm-text" id="alarm-message">메모 내용이 여기에 표시됩니다.</div>
            <button class="alarm-close" onclick="closeAlarm()">확인</button>
        </div>
    </div>

    <script>
        const memoInput = document.getElementById('memo-input');
        const memoEventTime = document.getElementById('memo-event-time');
        const memoAlarmTime = document.getElementById('memo-alarm-time');
        const memoListContainer = document.getElementById('memo-list-container');
        const emptyState = document.getElementById('empty-state');
        const calendarGrid = document.getElementById('calendar-grid');
        const monthYearDisplay = document.getElementById('month-year-display');
        const selectedDateDisplay = document.getElementById('selected-date-display');
        const memoStats = document.getElementById('memo-stats');
        const priorityBtns = document.querySelectorAll('.priority-btn');
        const alarmOverlay = document.getElementById('alarm-overlay');
        const alarmMessage = document.getElementById('alarm-message');

        let currentDate = new Date();
        let selectedDate = new Date();
        let selectedPriority = 'urgent-important';
        let viewMode = 'daily';
        let storage = JSON.parse(localStorage.getItem('calendarMemos')) || {};

        const HOLIDAYS = {
            // 2025
            "2025-01-01": "신정",
            "2025-01-28": "설날",
            "2025-01-29": "설날",
            "2025-01-30": "설날",
            "2025-03-01": "삼일절",
            "2025-05-01": "근로자의 날",
            "2025-05-05": "어린이날",
            "2025-05-06": "대체공휴일",
            "2025-06-06": "현충일",
            "2025-07-17": "제헌절",
            "2025-08-15": "광복절",
            "2025-10-03": "개천절",
            "2025-10-05": "추석",
            "2025-10-06": "추석",
            "2025-10-07": "추석",
            "2025-10-08": "대체공휴일",
            "2025-10-09": "한글날",
            "2025-12-25": "성탄절",
            // 2026
            "2026-01-01": "신정",
            "2026-02-16": "설날",
            "2026-02-17": "설날",
            "2026-02-18": "설날",
            "2026-03-01": "삼일절",
            "2026-03-02": "대체공휴일",
            "2026-05-01": "근로자의 날",
            "2026-05-05": "어린이날",
            "2026-05-24": "부처님오신날",
            "2026-05-25": "대체공휴일",
            "2026-06-03": "지방선거",
            "2026-06-06": "현충일",
            "2026-06-08": "대체공휴일",
            "2026-07-17": "제헌절",
            "2026-08-15": "광복절",
            "2026-08-17": "대체공휴일",
            "2026-09-23": "추석",
            "2026-09-24": "추석",
            "2026-09-25": "추석",
            "2026-10-03": "개천절",
            "2026-10-05": "대체공휴일",
            "2026-10-09": "한글날",
            "2026-12-25": "성탄절"
        };

        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        priorityBtns.forEach(btn => {
            btn.onclick = () => {
                priorityBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedPriority = btn.dataset.priority;
            };
        });

        function setViewMode(mode) {
            viewMode = mode;
            document.getElementById('view-daily').classList.toggle('active', mode === 'daily');
            document.getElementById('view-weekly').classList.toggle('active', mode === 'weekly');
            updateHeaderDisplay(); renderMemos();
        }

        function saveData() { localStorage.setItem('calendarMemos', JSON.stringify(storage)); }
        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function renderCalendar() {
            calendarGrid.innerHTML = '';
            ['일', '월', '화', '수', '목', '금', '토'].forEach(day => {
                const div = document.createElement('div');
                div.className = 'day-label'; div.textContent = day; calendarGrid.appendChild(div);
            });
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            monthYearDisplay.innerHTML = `<span class="editable-date" onclick="editYear(${year})">${year}년</span><span class="editable-date" onclick="editMonth(${month})">${month + 1}월</span>`;
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) {
                const div = document.createElement('div'); div.className = 'calendar-day empty'; calendarGrid.appendChild(div);
            }
            const todayStr = formatDate(new Date());
            const selectedStr = formatDate(selectedDate);
            for (let d = 1; d <= lastDate; d++) {
                const dateObj = new Date(year, month, d);
                const dateStr = formatDate(dateObj);
                const div = document.createElement('div');
                div.className = 'calendar-day';
                if (dateObj.getDay() === 0) div.classList.add('sun');
                if (HOLIDAYS[dateStr]) div.classList.add('holiday');
                if (dateStr === todayStr) div.classList.add('today');
                if (dateStr === selectedStr) div.classList.add('selected');
                if (storage[dateStr] && storage[dateStr].length > 0) div.classList.add('has-memo');
                div.textContent = d;
                div.onclick = () => selectDate(dateObj);
                calendarGrid.appendChild(div);
            }
        }

        function selectDate(date) {
            selectedDate = date; updateHeaderDisplay(); renderCalendar(); renderMemos();
        }

        function updateHeaderDisplay() {
            if (viewMode === 'daily') {
                const holidayName = HOLIDAYS[formatDate(selectedDate)];
                selectedDateDisplay.innerHTML = `${selectedDate.getFullYear()}년 ${selectedDate.getMonth() + 1}월 ${selectedDate.getDate()}일 ${holidayName ? `<span style="color:var(--holiday); font-size:0.9rem; margin-left:8px;">(${holidayName})</span>` : ''}`;
            } else {
                const sun = new Date(selectedDate);
                sun.setDate(selectedDate.getDate() - selectedDate.getDay());
                const sat = new Date(sun); sat.setDate(sun.getDate() + 6);
                selectedDateDisplay.textContent = `${sun.getMonth() + 1}/${sun.getDate()} - ${sat.getMonth() + 1}/${sat.getDate()} 주간 기록`;
            }
        }

        function changeMonth(delta) { currentDate.setMonth(currentDate.getMonth() + delta); renderCalendar(); }

        function editYear(currentYear) {
            const span = monthYearDisplay.querySelector('.editable-date:first-child');
            const input = document.createElement('input');
            input.type = 'number';
            input.value = currentYear;
            input.className = 'year-input';
            const apply = () => {
                const val = parseInt(input.value);
                if (val >= 1900 && val <= 2100) currentDate.setFullYear(val);
                renderCalendar();
            };
            input.onblur = apply;
            input.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); apply(); } if (e.key === 'Escape') renderCalendar(); };
            span.replaceWith(input);
            input.focus(); input.select();
        }

        function editMonth(currentMonth) {
            const span = monthYearDisplay.querySelector('.editable-date:last-child');
            const select = document.createElement('select');
            select.className = 'month-select';
            for (let i = 0; i < 12; i++) {
                const opt = document.createElement('option');
                opt.value = i; opt.textContent = `${i + 1}월`;
                if (i === currentMonth) opt.selected = true;
                select.appendChild(opt);
            }
            select.onchange = () => { currentDate.setMonth(parseInt(select.value)); renderCalendar(); };
            select.onblur = () => renderCalendar();
            span.replaceWith(select);
            select.focus();
        }

        const PRIORITY_LABELS = { 'urgent-important': '급하고 중요한 일', 'important': '중요한 일', 'urgent': '급한데 덜 중요한 일', 'low': '덜 중요한 일' };
        const PRIORITY_ORDER = ['urgent-important', 'important', 'urgent', 'low'];

        function renderMemos() {
            memoListContainer.innerHTML = '';
            let totalCount = 0;

            if (viewMode === 'daily') {
                const dateKey = formatDate(selectedDate);
                const memos = storage[dateKey] || [];
                totalCount = memos.length;
                if (totalCount === 0) {
                    emptyState.style.display = 'block';
                } else {
                    emptyState.style.display = 'none';
                    memoListContainer.appendChild(createMemoList(memos, dateKey));
                }
            } else {
                const sun = new Date(selectedDate);
                sun.setDate(selectedDate.getDate() - selectedDate.getDay());
                let hasAnyMemo = false;
                for (let i = 0; i < 7; i++) {
                    const day = new Date(sun); day.setDate(sun.getDate() + i);
                    const dateKey = formatDate(day);
                    const memos = storage[dateKey] || [];
                    if (memos.length > 0) {
                        hasAnyMemo = true; totalCount += memos.length;
                        const group = document.createElement('div');
                        group.className = 'day-group';
                        const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
                        group.innerHTML = `<div class="day-group-header"><h3>${dayNames[day.getDay()]}요일</h3><span class="date-sub">${day.getMonth() + 1}월 ${day.getDate()}일</span></div>`;
                        group.appendChild(createMemoList(memos, dateKey));
                        memoListContainer.appendChild(group);
                    }
                }
                emptyState.style.display = hasAnyMemo ? 'none' : 'block';
            }
            memoStats.textContent = `${totalCount} items`;
        }

        function createMemoList(memos, dateKey) {
            const ul = document.createElement('ul'); ul.className = 'memo-item-list';
            const sorted = [...memos].sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                const timeA = a.eventTime || a.time || "99:99";
                const timeB = b.eventTime || b.time || "99:99";
                return timeA.localeCompare(timeB);
            });

            sorted.forEach((memo) => {
                const originalIndex = memos.indexOf(memo);
                const li = document.createElement('li');
                li.className = `memo-item priority-${memo.priority || 'important'} ${memo.completed ? 'completed' : ''}`;

                const displayEventTime = memo.eventTime || memo.time;
                const displayAlarmTime = memo.alarmTime;

                li.innerHTML = `
                    <div style="display:flex; flex-direction:column; gap:4px; flex:1;">
                        <div class="time-info">
                            <span class="priority-badge">${PRIORITY_LABELS[memo.priority] || '중요한 일'}</span>
                            ${displayEventTime ? `<span class="time-badge event">🕒 ${displayEventTime}</span>` : ''}
                            ${displayAlarmTime ? `<span class="time-badge alarm">🔔 ${displayAlarmTime}</span>` : ''}
                        </div>
                        <span class="memo-text">${escapeHtml(memo.text)}</span>
                    </div>
                    <div class="actions">
                        <button class="action-btn complete-btn" onclick="toggleComplete('${dateKey}', ${originalIndex})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
                        <button class="action-btn delete-btn" onclick="deleteMemo('${dateKey}', ${originalIndex})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg></button>
                    </div>
                `;
                ul.appendChild(li);
            });
            return ul;
        }

        function addMemo() {
            const text = memoInput.value.trim();
            const eventTime = memoEventTime.value;
            let alarmTime = memoAlarmTime.value;

            if (!text) return;

            // 만약 알람 시간이 없고 일정 시간만 있다면, 알람 시간을 일정 시간으로 설정
            if (!alarmTime && eventTime) alarmTime = eventTime;

            const dateKey = formatDate(selectedDate);
            if (!storage[dateKey]) storage[dateKey] = [];
            storage[dateKey].push({ text, completed: false, priority: selectedPriority, eventTime, alarmTime, alarmTriggered: false });

            memoInput.value = ''; memoEventTime.value = ''; memoAlarmTime.value = '';
            saveData(); renderMemos(); renderCalendar();
        }

        function toggleComplete(dateKey, index) { storage[dateKey][index].completed = !storage[dateKey][index].completed; saveData(); renderMemos(); }
        function deleteMemo(dateKey, index) { storage[dateKey].splice(index, 1); if (storage[dateKey].length === 0) delete storage[dateKey]; saveData(); renderMemos(); renderCalendar(); }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        function checkAlarms() {
            const now = new Date();
            const todayKey = formatDate(now);
            const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            const memos = storage[todayKey] || [];
            memos.forEach(memo => {
                const targetTime = memo.alarmTime || memo.time;
                if (targetTime === currentTime && !memo.completed && !memo.alarmTriggered) {
                    triggerAlarm(memo);
                    memo.alarmTriggered = true;
                    saveData();
                }
            });
        }

        function triggerAlarm(memo) {
            alarmMessage.textContent = memo.text;
            alarmOverlay.style.display = 'flex';
            if (Notification.permission === "granted") {
                new Notification("⏰ Matrix Planner 알람", { body: `${memo.text} (알람 시간: ${memo.alarmTime})` });
            }
        }

        function closeAlarm() { alarmOverlay.style.display = 'none'; }
        setInterval(checkAlarms, 10000);

        // ── 카테고리 메모 시스템 ──
        let catMemoData = JSON.parse(localStorage.getItem('catMemoData')) || { categories: [], memos: {} };
        let selectedCatId = null;
        const CAT_PALETTE = ['#8b5cf6', '#f472b6', '#10b981', '#f59e0b', '#ef4444', '#3b82f6', '#14b8a6', '#f97316'];
        let catPickedColor = CAT_PALETTE[0];

        function saveCatData() {
            localStorage.setItem('catMemoData', JSON.stringify(catMemoData));
            const total = catMemoData.categories.reduce((s, c) => s + (catMemoData.memos[c.id] || []).length, 0);
            const sub = document.getElementById('memo-trigger-sub');
            if (sub) sub.textContent = catMemoData.categories.length > 0 ? `카테고리 ${catMemoData.categories.length}개 · 메모 ${total}개` : '카테고리별 메모 관리';
        }

        function openMemoModal() {
            document.getElementById('cat-memo-overlay').style.display = 'flex';
            selectedCatId = null;
            renderCatList();
            document.getElementById('note-panel').innerHTML = '<div class="no-cat-msg">카테고리를 선택하세요</div>';
        }

        function closeMemoModal() { document.getElementById('cat-memo-overlay').style.display = 'none'; }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('cat-memo-overlay').style.display === 'flex') closeMemoModal();
                if (document.getElementById('mm-overlay').style.display === 'flex') closeMindMapModal();
            }
        });

        function renderCatList() {
            const list = document.getElementById('cat-list');
            if (!list) return;
            if (catMemoData.categories.length === 0) {
                list.innerHTML = '<div style="padding:16px 10px;font-size:0.76rem;color:var(--text-muted);text-align:center;line-height:1.7;">카테고리를 추가하여<br>메모를 정리하세요</div>';
                return;
            }
            list.innerHTML = catMemoData.categories.map(cat => {
                const count = (catMemoData.memos[cat.id] || []).length;
                return `<div class="cat-item ${selectedCatId === cat.id ? 'active' : ''}" onclick="selectCat('${cat.id}')">
                    <span class="cat-dot" style="background:${cat.color}"></span>
                    <span class="cat-name">${escapeHtml(cat.name)}</span>
                    <span class="cat-count">${count}</span>
                    <button class="cat-del-btn" onclick="deleteCat(event,'${cat.id}')" title="삭제">✕</button>
                </div>`;
            }).join('');
        }

        function showCatForm() {
            catPickedColor = CAT_PALETTE[0];
            document.getElementById('cat-panel-top').innerHTML = `
                <div class="cat-add-form">
                    <input class="cat-name-input" id="cat-name-input" placeholder="카테고리 이름" maxlength="20"
                        onkeydown="if(event.key==='Enter')addCategory();if(event.key==='Escape')hideCatForm();">
                    <div class="color-palette">${CAT_PALETTE.map((c, i) => `<div class="color-dot${i === 0 ? ' selected' : ''}" style="background:${c}" onclick="pickCatColor('${c}',this)"></div>`).join('')}</div>
                    <div class="cat-form-btns">
                        <button class="side-btn ghost" onclick="hideCatForm()" style="flex:1;">취소</button>
                        <button class="side-btn primary" onclick="addCategory()" style="flex:1;">추가</button>
                    </div>
                </div>`;
            document.getElementById('cat-name-input').focus();
        }

        function hideCatForm() {
            document.getElementById('cat-panel-top').innerHTML = '<button class="cat-add-btn" onclick="showCatForm()">+ 새 카테고리</button>';
        }

        function pickCatColor(color, el) {
            catPickedColor = color;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
        }

        function addCategory() {
            const input = document.getElementById('cat-name-input');
            const name = input ? input.value.trim() : '';
            if (!name) { if (input) input.focus(); return; }
            const id = 'cat_' + Date.now();
            catMemoData.categories.push({ id, name, color: catPickedColor });
            catMemoData.memos[id] = [];
            saveCatData();
            hideCatForm();
            renderCatList();
            selectCat(id);
        }

        function deleteCat(e, id) {
            e.stopPropagation();
            const cat = catMemoData.categories.find(c => c.id === id);
            const count = (catMemoData.memos[id] || []).length;
            const msg = count > 0 ? `"${cat.name}" 카테고리와 메모 ${count}개를 삭제할까요?` : `"${cat.name}" 카테고리를 삭제할까요?`;
            if (!confirm(msg)) return;
            catMemoData.categories = catMemoData.categories.filter(c => c.id !== id);
            delete catMemoData.memos[id];
            saveCatData();
            if (selectedCatId === id) {
                selectedCatId = null;
                document.getElementById('note-panel').innerHTML = '<div class="no-cat-msg">카테고리를 선택하세요</div>';
            }
            renderCatList();
        }

        function selectCat(id) {
            selectedCatId = id;
            renderCatList();
            renderNotePanel();
        }

        function renderNotePanel() {
            const cat = catMemoData.categories.find(c => c.id === selectedCatId);
            if (!cat) return;
            const memos = catMemoData.memos[selectedCatId] || [];
            const noteListHtml = memos.length === 0
                ? `<div class="note-empty"><div class="note-empty-icon">📄</div><div class="note-empty-text">메모가 없습니다</div><div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;">새 메모를 추가해보세요</div></div>`
                : memos.map((memo, i) => `
                    <div class="note-item">
                        <div class="note-item-header">
                            <span class="note-item-title">${escapeHtml(memo.title || '제목 없음')}</span>
                            <div class="note-item-btns">
                                <button class="note-icon-btn" onclick="showNoteEditor(${i})" title="편집">✏️</button>
                                <button class="note-icon-btn" onclick="deleteNote(${i})" title="삭제">🗑️</button>
                            </div>
                        </div>
                        ${memo.content ? `<div class="note-item-preview">${escapeHtml(memo.content)}</div>` : ''}
                        <div class="note-item-date">${memo.createdAt}</div>
                    </div>`).join('');
            document.getElementById('note-panel').innerHTML = `
                <div class="note-panel-top">
                    <span class="note-panel-title"><span style="color:${cat.color};font-size:0.7rem;">●</span> ${escapeHtml(cat.name)}</span>
                    <button class="note-add-btn" onclick="showNoteEditor()">+ 새 메모</button>
                </div>
                <div class="note-list">${noteListHtml}</div>`;
        }

        function showNoteEditor(editIndex = -1) {
            const memos = catMemoData.memos[selectedCatId] || [];
            const memo = editIndex >= 0 ? memos[editIndex] : null;
            document.getElementById('note-panel').innerHTML = `
                <div class="note-panel-top">
                    <span class="note-panel-title">${editIndex >= 0 ? '✏️ 메모 편집' : '✏️ 새 메모'}</span>
                </div>
                <div class="note-editor">
                    <input class="note-editor-title-input" id="note-title-input" placeholder="제목 (선택)" value="${memo ? escapeHtml(memo.title || '') : ''}">
                    <textarea class="note-editor-body" id="note-body-input" placeholder="내용을 입력하세요...">${memo ? escapeHtml(memo.content || '') : ''}</textarea>
                    <div class="note-editor-footer">
                        <button class="side-btn ghost" onclick="renderNotePanel()">취소</button>
                        <button class="side-btn primary" onclick="saveNote(${editIndex})">저장</button>
                    </div>
                </div>`;
            document.getElementById('note-body-input').focus();
        }

        function saveNote(editIndex) {
            const title = document.getElementById('note-title-input').value.trim();
            const content = document.getElementById('note-body-input').value.trim();
            if (!title && !content) return;
            const memos = catMemoData.memos[selectedCatId];
            if (editIndex >= 0) {
                memos[editIndex] = { ...memos[editIndex], title, content };
            } else {
                memos.push({ id: 'note_' + Date.now(), title, content, createdAt: formatDate(new Date()) });
            }
            saveCatData();
            renderCatList();
            renderNotePanel();
        }

        function deleteNote(index) {
            if (!confirm('메모를 삭제할까요?')) return;
            catMemoData.memos[selectedCatId].splice(index, 1);
            saveCatData();
            renderCatList();
            renderNotePanel();
        }

        saveCatData();

        // 일정찾기
        let searchTimeout = null;
        document.getElementById('search-field').addEventListener('input', function () {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const query = this.value.trim().toLowerCase();
                const resultsEl = document.getElementById('search-results');
                if (!query) { resultsEl.innerHTML = ''; return; }

                const matches = [];
                Object.entries(storage).forEach(([dateKey, memos]) => {
                    memos.forEach(memo => {
                        if (memo.text.toLowerCase().includes(query)) matches.push({ dateKey, memo });
                    });
                });

                if (matches.length === 0) {
                    resultsEl.innerHTML = '<div class="search-empty">검색 결과가 없습니다.</div>';
                    return;
                }

                matches.sort((a, b) => a.dateKey.localeCompare(b.dateKey));
                resultsEl.innerHTML = matches.map(({ dateKey, memo }) => {
                    const [y, m, d] = dateKey.split('-');
                    return `<div class="search-result-item" onclick="goToDate('${dateKey}')">
                        <span class="result-date">${y}년 ${parseInt(m)}월 ${parseInt(d)}일</span>
                        <span class="result-text">${escapeHtml(memo.text)}</span>
                        <span class="result-priority">${PRIORITY_LABELS[memo.priority] || ''}</span>
                    </div>`;
                }).join('');
            }, 250);
        });

        function goToDate(dateKey) {
            const [y, m, d] = dateKey.split('-').map(Number);
            currentDate = new Date(y, m - 1, d);
            selectDate(new Date(y, m - 1, d));
        }

        // ── 마인드맵 시스템 ──
        let mindMapData = JSON.parse(localStorage.getItem('mindMapData')) || { categories: [], maps: {} };
        let selectedMMCatId = null;
        let selectedMMNodeId = null;
        let mmDraggingId = null;
        let mmDragStart = { x: 0, y: 0 };
        let mmNodeStart = { x: 0, y: 0 };
        const MM_PALETTE = ['#8b5cf6', '#f472b6', '#10b981', '#f59e0b', '#ef4444', '#3b82f6', '#14b8a6', '#f97316'];
        const MM_NODE_BG = ['#ede9fe', '#fce7f3', '#d1fae5', '#fef3c7', '#fee2e2', '#dbeafe', '#ccfbf1', '#ffedd5'];
        const MM_NODE_BD = ['#c4b5fd', '#f9a8d4', '#6ee7b7', '#fcd34d', '#fca5a5', '#93c5fd', '#5eead4', '#fdba74'];
        let mmPickedColor = MM_PALETTE[0];

        function saveMMData() {
            localStorage.setItem('mindMapData', JSON.stringify(mindMapData));
            const total = mindMapData.categories.reduce((s, c) => s + Math.max(0, (mindMapData.maps[c.id]?.nodes?.length || 1) - 1), 0);
            const sub = document.getElementById('mm-trigger-sub');
            if (sub) sub.textContent = mindMapData.categories.length > 0 ? `마인드맵 ${mindMapData.categories.length}개 · 노드 ${total}개` : '카테고리별 마인드맵 관리';
        }

        function openMindMapModal() {
            document.getElementById('mm-overlay').style.display = 'flex';
            selectedMMCatId = null; selectedMMNodeId = null;
            renderMMCatList();
            document.getElementById('mm-content').innerHTML = '<div class="mm-no-cat">마인드맵을 선택하세요</div>';
        }
        function closeMindMapModal() { document.getElementById('mm-overlay').style.display = 'none'; }
        document.addEventListener('keydown', e => {
            if (document.getElementById('mm-overlay').style.display !== 'flex') return;

            // Only proceed if a node is selected and we are NOT in an input/textarea
            if (selectedMMNodeId && !['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    addMMChild(selectedMMNodeId);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    const map = mindMapData.maps[selectedMMCatId];
                    const node = map.nodes.find(n => n.id === selectedMMNodeId);
                    if (node && node.parentId) {
                        addMMChild(node.parentId);
                    }
                }
            }
        });

        function renderMMCatList() {
            const list = document.getElementById('mm-cat-list');
            if (!list) return;
            if (mindMapData.categories.length === 0) {
                list.innerHTML = '<div style="padding:16px 10px;font-size:0.76rem;color:var(--text-muted);text-align:center;line-height:1.7;">+ 버튼으로<br>마인드맵을 만드세요</div>';
                return;
            }
            list.innerHTML = mindMapData.categories.map(cat => {
                const count = Math.max(0, (mindMapData.maps[cat.id]?.nodes?.length || 1) - 1);
                return `<div class="cat-item ${selectedMMCatId === cat.id ? 'active' : ''}" onclick="selectMMCat('${cat.id}')">
                    <span class="cat-dot" style="background:${cat.color}"></span>
                    <span class="cat-name">${escapeHtml(cat.name)}</span>
                    <span class="cat-count">${count}</span>
                    <button class="cat-del-btn" onclick="deleteMMCat(event,'${cat.id}')" title="삭제">✕</button>
                </div>`;
            }).join('');
        }

        function showMMCatForm() {
            mmPickedColor = MM_PALETTE[0];
            document.getElementById('mm-panel-top').innerHTML = `
                <div class="cat-add-form">
                    <input class="cat-name-input" id="mm-cat-input" placeholder="마인드맵 이름" maxlength="20"
                        onkeydown="if(event.key==='Enter')addMMCat();if(event.key==='Escape')hideMMCatForm();">
                    <div class="color-palette">${MM_PALETTE.map((c, i) => `<div class="color-dot${i === 0 ? ' selected' : ''}" style="background:${c}" onclick="pickMMColor('${c}',this)"></div>`).join('')}</div>
                    <div class="cat-form-btns">
                        <button class="side-btn ghost" onclick="hideMMCatForm()" style="flex:1;">취소</button>
                        <button class="side-btn primary" onclick="addMMCat()" style="flex:1;">추가</button>
                    </div>
                </div>`;
            document.getElementById('mm-cat-input').focus();
        }
        function hideMMCatForm() { document.getElementById('mm-panel-top').innerHTML = '<button class="cat-add-btn" onclick="showMMCatForm()">+ 새 마인드맵</button>'; }
        function pickMMColor(color, el) {
            mmPickedColor = color;
            document.querySelectorAll('#mm-panel-top .color-dot').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
        }

        function addMMCat() {
            const input = document.getElementById('mm-cat-input');
            const name = input ? input.value.trim() : '';
            if (!name) { if (input) input.focus(); return; }
            const id = 'mmcat_' + Date.now();
            mindMapData.categories.push({ id, name, color: mmPickedColor });
            mindMapData.maps[id] = { nodes: [{ id: 'root_' + id, text: name, x: 1450, y: 950, parentId: null, isRoot: true }] };
            saveMMData(); hideMMCatForm(); renderMMCatList(); selectMMCat(id);
        }

        function deleteMMCat(e, id) {
            e.stopPropagation();
            const cat = mindMapData.categories.find(c => c.id === id);
            if (!confirm(`"${cat.name}" 마인드맵을 삭제할까요?`)) return;
            mindMapData.categories = mindMapData.categories.filter(c => c.id !== id);
            delete mindMapData.maps[id];
            saveMMData();
            if (selectedMMCatId === id) { selectedMMCatId = null; document.getElementById('mm-content').innerHTML = '<div class="mm-no-cat">마인드맵을 선택하세요</div>'; }
            renderMMCatList();
        }

        function selectMMCat(id) { selectedMMCatId = id; selectedMMNodeId = null; renderMMCatList(); renderMindMap(); }

        function renderMindMap() {
            document.getElementById('mm-content').innerHTML = `
                <div class="mm-toolbar">
                    <span class="mm-hint">💡 탭: 하위 &nbsp;·&nbsp; 엔터: 동 레벨 &nbsp;·&nbsp; Ctrl+Z: 되돌리기</span>
                    <div style="margin-left:auto; display:flex; gap:6px;">
                        <button class="mm-tool-btn" onclick="undoMM()" title="실행 취소 (Ctrl+Z)">↩️</button>
                        <button class="mm-tool-btn" onclick="redoMM()" title="다시 실행 (Ctrl+Y)">↪️</button>
                        <button class="mm-tool-btn" onclick="exportMMImage()" title="이미지로 저장">💾 저장</button>
                        <button class="mm-tool-btn" onclick="resetMMView()">🎯 초기화</button>
                    </div>
                </div>
                <div class="mm-canvas-wrap" id="mm-canvas-wrap" onclick="deselectMM(event)">
                    <div class="mm-canvas" id="mm-canvas">
                        <canvas id="mm-export-canvas" style="display:none;"></canvas>
                        <svg class="mm-svg" id="mm-svg" xmlns="http://www.w3.org/2000/svg"></svg>
                    </div>
                </div>`;
            renderMMNodes();
            setTimeout(() => {
                const root = mindMapData.maps[selectedMMCatId]?.nodes.find(n => n.isRoot);
                const wrap = document.getElementById('mm-canvas-wrap');
                if (root && wrap) { wrap.scrollLeft = root.x - wrap.clientWidth / 2 + 60; wrap.scrollTop = root.y - wrap.clientHeight / 2 + 20; }
            }, 30);
        }

        function renderMMNodes() {
            const cat = mindMapData.categories.find(c => c.id === selectedMMCatId);
            const map = mindMapData.maps[selectedMMCatId];
            const canvas = document.getElementById('mm-canvas');
            if (!canvas || !cat || !map) return;
            canvas.querySelectorAll('.mm-node').forEach(el => el.remove());

            map.nodes.forEach(node => {
                const el = document.createElement('div');
                el.id = 'mm-node-' + node.id;
                el.className = `mm-node${node.isRoot ? ' root' : ''}${selectedMMNodeId === node.id ? ' selected' : ''}`;
                const bg = node.isRoot ? cat.color : (node.bg || MM_NODE_BG[0]);
                const bd = node.isRoot ? cat.color : (node.bd || MM_NODE_BD[0]);
                const clr = node.isRoot ? 'white' : '#1e1b4b';
                el.style.cssText = `left:${node.x}px;top:${node.y}px;background:${bg};color:${clr};border-color:${bd};`;
                el.innerHTML = `
                    <span class="mm-node-text">${escapeHtml(node.text)}</span>
                    <div class="mm-node-controls">
                        <button class="mm-ctrl-btn mm-ctrl-add" onclick="addMMChild('${node.id}')">+</button>
                        ${!node.isRoot ? `<button class="mm-ctrl-btn mm-ctrl-del" onclick="deleteMMNode('${node.id}')">×</button>` : ''}
                    </div>`;
                el.addEventListener('mousedown', e => startMMDrag(e, node.id));
                el.addEventListener('dblclick', e => { e.stopPropagation(); startMMEdit(node.id); });
                el.addEventListener('click', e => { e.stopPropagation(); selectMMNode(node.id); });
                canvas.appendChild(el);
            });
            updateMMLines();
        }

        function updateMMLines() {
            const svg = document.getElementById('mm-svg');
            const cat = mindMapData.categories.find(c => c.id === selectedMMCatId);
            const map = mindMapData.maps[selectedMMCatId];
            if (!svg || !cat || !map) return;

            map.nodes.forEach(node => {
                if (!node.parentId) return;
                const parent = map.nodes.find(n => n.id === node.parentId);
                if (!parent) return;
                const pEl = document.getElementById('mm-node-' + parent.id);
                const cEl = document.getElementById('mm-node-' + node.id);
                if (!pEl || !cEl) return;

                const x1 = parent.x + pEl.offsetWidth / 2, y1 = parent.y + pEl.offsetHeight / 2;
                const x2 = node.x + cEl.offsetWidth / 2, y2 = node.y + cEl.offsetHeight / 2;
                const cx = (x1 + x2) / 2;
                const d = `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`;

                let path = document.getElementById(`path-${node.id}`);
